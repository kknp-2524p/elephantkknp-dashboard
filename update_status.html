<!DOCTYPE html>
<html lang="th">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1.0" />
    <title>อัปเดทสถานะ — แก่งกระจาน</title>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Thai:wght@300;400;500;600;700&display=swap"
        rel="stylesheet" />
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --c-bg: #f0f3ef;
            --c-card: #fff;
            --c-hdr-a: #0d2416;
            --c-hdr-b: #133a22;
            --c-green: #1a6b42;
            --c-green-lt: #d4eddf;
            --c-amber: #b86a00;
            --c-amber-lt: #fdf0d5;
            --c-red: #b52222;
            --c-red-lt: #fde8e8;
            --c-border: #dde3d9;
            --c-ink: #111b14;
            --c-ink2: #3d5045;
            --c-ink3: #7a927f;
            --c-paid: #059669;
            --c-pend: #d97706;
            --c-waive: #9ca3af;
            --ff: 'IBM Plex Sans Thai', 'Sarabun', sans-serif;
            --r-lg: 16px;
            --sh: 0 1px 3px rgba(13, 36, 22, .06), 0 6px 18px rgba(13, 36, 22, .04);
            --sh-md: 0 4px 12px rgba(13, 36, 22, .08), 0 16px 40px rgba(13, 36, 22, .06);
        }

        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0
        }

        body {
            font-family: var(--ff);
            background: var(--c-bg);
            color: var(--c-ink);
            font-size: 14px;
            line-height: 1.65;
            -webkit-font-smoothing: antialiased
        }

        button,
        input,
        select {
            font-family: var(--ff)
        }

        /* HEADER */
        .hdr {
            background: linear-gradient(135deg, var(--c-hdr-a), var(--c-hdr-b));
            padding: 0 1rem
        }

        .hdr-inner {
            max-width: 680px;
            margin: 0 auto;
            min-height: 58px;
            padding: 8px 0;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: .75rem;
            flex-wrap: wrap
        }

        .hdr-left {
            display: flex;
            align-items: center;
            gap: 10px
        }

        .hdr-badge {
            width: 36px;
            height: 36px;
            background: rgba(255, 255, 255, .1);
            border: 1px solid rgba(255, 255, 255, .15);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            flex-shrink: 0
        }

        .hdr-title h1 {
            font-size: 13px;
            font-weight: 600;
            color: #fff;
            line-height: 1.3
        }

        .hdr-title p {
            font-size: 10px;
            color: rgba(255, 255, 255, .5);
            margin-top: 2px
        }

        .hdr-back {
            display: flex;
            align-items: center;
            gap: 5px;
            background: rgba(255, 255, 255, .08);
            border: 1px solid rgba(255, 255, 255, .12);
            border-radius: 20px;
            padding: 4px 12px;
            font-size: 11px;
            color: rgba(255, 255, 255, .8);
            text-decoration: none;
            transition: background .15s;
            white-space: nowrap
        }

        .hdr-back:hover {
            background: rgba(255, 255, 255, .18)
        }

        /* MAIN */
        main {
            max-width: 680px;
            margin: 0 auto;
            padding: 1.5rem 1rem 3rem
        }

        /* CARD */
        .card {
            background: var(--c-card);
            border-radius: var(--r-lg);
            padding: 1.25rem 1.5rem;
            box-shadow: var(--sh);
            border: 1px solid var(--c-border);
            margin-bottom: 1rem
        }

        .card-title {
            font-size: 14px;
            font-weight: 600;
            color: var(--c-ink);
            margin-bottom: .25rem
        }

        .card-sub {
            font-size: 11.5px;
            color: var(--c-ink3);
            margin-bottom: 1rem
        }

        /* SEARCH */
        .search-wrap {
            position: relative
        }

        .search-input {
            width: 100%;
            padding: 10px 44px 10px 14px;
            border: 1.5px solid var(--c-border);
            border-radius: 10px;
            font-size: 14px;
            color: var(--c-ink);
            outline: none;
            background: var(--c-bg);
            transition: border-color .15s;
        }

        .search-input:focus {
            border-color: var(--c-green)
        }

        .search-ico {
            position: absolute;
            right: 14px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--c-ink3);
            pointer-events: none
        }

        /* RESULTS */
        .results {
            margin-top: 8px;
            border: 1px solid var(--c-border);
            border-radius: 10px;
            overflow: hidden;
            display: none
        }

        .result-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 10px 14px;
            border-bottom: 1px solid #f0f0ee;
            cursor: pointer;
            transition: background .1s;
            gap: 8px;
        }

        .result-item:last-child {
            border-bottom: none
        }

        .result-item:hover {
            background: var(--c-green-lt)
        }

        .result-item.selected {
            background: var(--c-green-lt);
            border-left: 3px solid var(--c-green)
        }

        .result-name {
            font-size: 13px;
            font-weight: 500;
            color: var(--c-ink)
        }

        .result-meta {
            font-size: 11px;
            color: var(--c-ink3);
            margin-top: 1px
        }

        .badge {
            display: inline-flex;
            align-items: center;
            font-size: 10.5px;
            padding: 2px 8px;
            border-radius: 20px;
            font-weight: 500;
            white-space: nowrap;
            flex-shrink: 0
        }

        .b-paid {
            background: var(--c-green-lt);
            color: #065f46
        }

        .b-pend {
            background: var(--c-amber-lt);
            color: #92400e
        }

        .b-waive {
            background: #e8edf3;
            color: #475569
        }

        .no-result {
            padding: 1.5rem;
            text-align: center;
            font-size: 13px;
            color: var(--c-ink3)
        }

        /* EDIT PANEL */
        .edit-panel {
            display: none;
            margin-top: 1rem;
            border: 1.5px solid var(--c-green);
            border-radius: 12px;
            overflow: hidden
        }

        .edit-panel.show {
            display: block
        }

        .edit-hd {
            background: var(--c-green-lt);
            padding: 12px 16px;
            display: flex;
            align-items: center;
            justify-content: space-between
        }

        .edit-hd-name {
            font-size: 14px;
            font-weight: 600;
            color: var(--c-green)
        }

        .edit-hd-meta {
            font-size: 11px;
            color: var(--c-ink3)
        }

        .edit-body {
            padding: 16px
        }

        .field-label {
            font-size: 11px;
            font-weight: 600;
            letter-spacing: .05em;
            text-transform: uppercase;
            color: var(--c-ink3);
            margin-bottom: 6px
        }

        .status-options {
            display: flex;
            flex-direction: column;
            gap: 8px
        }

        .status-opt {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px 14px;
            border-radius: 8px;
            border: 1.5px solid var(--c-border);
            cursor: pointer;
            transition: all .15s;
            background: transparent;
            text-align: left;
            width: 100%;
        }

        .status-opt:hover {
            border-color: var(--c-green);
            background: var(--c-green-lt)
        }

        .status-opt.active {
            border-color: var(--c-green);
            background: var(--c-green-lt)
        }

        .status-opt.active.s-paid {
            border-color: var(--c-paid);
            background: #f0fdf4
        }

        .status-opt.active.s-pend {
            border-color: var(--c-pend);
            background: #fffbeb
        }

        .status-opt.active.s-waive {
            border-color: #94a3b8;
            background: #f8fafc
        }

        .opt-dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            flex-shrink: 0
        }

        .opt-label {
            font-size: 13px;
            font-weight: 500;
            color: var(--c-ink)
        }

        .opt-desc {
            font-size: 11px;
            color: var(--c-ink3);
            margin-left: auto
        }

        .edit-footer {
            padding: 0 16px 16px;
            display: flex;
            gap: 8px
        }

        .btn-save {
            flex: 1;
            padding: 11px;
            border-radius: 10px;
            border: none;
            background: var(--c-green);
            color: #fff;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: background .15s;
            min-height: 44px;
        }

        .btn-save:hover {
            background: #155835
        }

        .btn-save:disabled {
            background: var(--c-waive);
            cursor: not-allowed
        }

        .btn-cancel {
            padding: 11px 18px;
            border-radius: 10px;
            border: 1px solid var(--c-border);
            background: transparent;
            font-size: 13px;
            color: var(--c-ink3);
            cursor: pointer;
            transition: all .15s;
            min-height: 44px;
        }

        .btn-cancel:hover {
            border-color: var(--c-red);
            color: var(--c-red)
        }

        /* TOAST */
        .toast {
            position: fixed;
            bottom: 24px;
            left: 50%;
            transform: translateX(-50%) translateY(80px);
            background: #111;
            color: #fff;
            padding: 10px 20px;
            border-radius: 20px;
            font-size: 13px;
            opacity: 0;
            transition: all .3s;
            z-index: 9999;
            white-space: nowrap;
        }

        .toast.show {
            transform: translateX(-50%) translateY(0);
            opacity: 1
        }

        .toast.success {
            background: var(--c-paid)
        }

        .toast.error {
            background: var(--c-red)
        }

        /* LOADING */
        .spinner {
            display: inline-block;
            width: 14px;
            height: 14px;
            border: 2px solid rgba(255, 255, 255, .3);
            border-top-color: #fff;
            border-radius: 50%;
            animation: spin .6s linear infinite;
            vertical-align: middle;
            margin-right: 6px
        }

        @keyframes spin {
            to {
                transform: rotate(360deg)
            }
        }

        footer {
            text-align: center;
            padding: 1.25rem 1rem;
            font-size: 11px;
            color: var(--c-ink3);
            border-top: 1px solid var(--c-border)
        }
    </style>
</head>

<body>

    <div class="toast" id="toast"></div>

    <header class="hdr">
        <div class="hdr-inner">
            <div class="hdr-left">
                <div class="hdr-badge">✏️</div>
                <div class="hdr-title">
                    <h1>อัปเดทสถานะการเยียวยา</h1>
                    <p>อุทยานแห่งชาติแก่งกระจาน</p>
                </div>
            </div>
            <a class="hdr-back" href="index.html">← กลับหน้าหลัก</a>
        </div>
    </header>

    <main>
        <div class="card">
            <div class="card-title">ค้นหารายการ</div>
            <div class="card-sub">พิมพ์ชื่อ-นามสกุลของผู้ขอรับการเยียวยา</div>
            <div class="search-wrap">
                <input class="search-input" id="search-input" type="text" placeholder="เช่น สมชาย ใจดี..."
                    oninput="onSearch()" autocomplete="off" />
                <svg class="search-ico" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                    stroke-width="2">
                    <circle cx="11" cy="11" r="8" />
                    <path d="m21 21-4.35-4.35" />
                </svg>
            </div>
            <div class="results" id="results"></div>
        </div>

        <div class="edit-panel" id="edit-panel">
            <div class="edit-hd">
                <div>
                    <div class="edit-hd-name" id="edit-name">—</div>
                    <div class="edit-hd-meta" id="edit-meta">—</div>
                </div>
                <span id="edit-current-badge"></span>
            </div>
            <div class="edit-body">
                <div class="field-label">เปลี่ยนสถานะเป็น</div>
                <div class="status-options">
                    <button class="status-opt s-paid" onclick="selectStatus('จ่ายเงินแล้ว')">
                        <span class="opt-dot" style="background:#059669"></span>
                        <span class="opt-label">✓ จ่ายเงินแล้ว</span>
                        <span class="opt-desc">บันทึกว่าจ่ายเงินเรียบร้อย</span>
                    </button>
                    <button class="status-opt s-pend" onclick="selectStatus('ยังไม่จ่าย')">
                        <span class="opt-dot" style="background:#d97706"></span>
                        <span class="opt-label">⏳ ยังไม่จ่าย</span>
                        <span class="opt-desc">รอดำเนินการจ่ายเงิน</span>
                    </button>
                    <button class="status-opt s-waive" onclick="selectStatus('ไม่ขอรับการเยียวยา')">
                        <span class="opt-dot" style="background:#9ca3af"></span>
                        <span class="opt-label">✗ ไม่ขอรับการเยียวยา</span>
                        <span class="opt-desc">ผู้เสียหายสละสิทธิ์</span>
                    </button>
                </div>
            </div>
            <div class="edit-footer">
                <button class="btn-save" id="btn-save" onclick="saveStatus()" disabled>เลือกสถานะก่อนบันทึก</button>
                <button class="btn-cancel" onclick="cancelEdit()">ยกเลิก</button>
            </div>
        </div>
    </main>

    <footer>อุทยานแห่งชาติแก่งกระจาน · ระบบอัปเดทสถานะการเยียวยา</footer>

    <script>
        const SUPABASE_URL = 'https://xzuzpkzxyimcvgninskt.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inh6dXpwa3p4eWltY3Znbmluc2t0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA3MjcwMTksImV4cCI6MjA5NjMwMzAxOX0.P8uSZ4dlhCXyEfSOntD65eTAbYsJWkQ3SQFSsbmJm7k';

        const { createClient } = supabase;
        const sb = createClient(SUPABASE_URL, SUPABASE_KEY);

        // เช็ค session ก่อนแสดงหน้า
        window.addEventListener('load', async () => {
            const { data: { session } } = await sb.auth.getSession();
            if (!session) {
                // ไม่ได้ login → เด้งกลับ form.html
                window.location.href = 'form.html';
                return;
            }
            // login แล้ว → โหลดข้อมูล
            loadData();
        });

        async function loadData() {
            const res = await fetch(`${SUPABASE_URL}/rest/v1/compensation?select=id,name,compensation_case,compensation_status,incident_date,fiscal_year&order=name.asc`, {
                headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}` }
            });
            allData = (await res.json()).filter(r => r.id && r.name);
        }

        let allData = [];
        let selectedRecord = null;
        let selectedStatus = null;

        // โหลดข้อมูลทั้งหมดครั้งเดียว
        fetch(`${SUPABASE_URL}/rest/v1/compensation?select=id,name,compensation_case,compensation_status,incident_date,fiscal_year&order=name.asc`, {
            headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}` }
        })
            .then(r => r.json())
            .then(data => { allData = data.filter(r => r.id && r.name) });

        function onSearch() {
            const q = document.getElementById('search-input').value.trim().toLowerCase();
            const box = document.getElementById('results');
            cancelEdit();

            if (q.length < 1) { box.style.display = 'none'; return; }

            const hits = allData.filter(r => r.name.toLowerCase().includes(q)).slice(0, 10);
            box.style.display = 'block';

            if (!hits.length) {
                box.innerHTML = `<div class="no-result">ไม่พบชื่อ "${q}"</div>`;
                return;
            }

            box.innerHTML = hits.map(r => `
            <div class="result-item" onclick="selectRecord(${r.id})">
                <div>
                    <div class="result-name">${r.name}</div>
                    <div class="result-meta">${r.compensation_case || '—'} · ปี ${r.fiscal_year || '—'} · ${r.incident_date || '—'}</div>
                </div>
                ${statusBadge(r.compensation_status)}
            </div>`).join('');
        }

        function statusBadge(s) {
            const cls = { 'จ่ายเงินแล้ว': 'b-paid', 'ยังไม่จ่าย': 'b-pend', 'ไม่ขอรับการเยียวยา': 'b-waive' };
            return `<span class="badge ${cls[s] || 'b-waive'}">${s || '—'}</span>`;
        }

        function selectRecord(id) {
            selectedRecord = allData.find(r => r.id === id);
            selectedStatus = null;

            // highlight row
            document.querySelectorAll('.result-item').forEach(el => el.classList.remove('selected'));
            event.currentTarget.classList.add('selected');

            // fill edit panel
            document.getElementById('edit-name').textContent = selectedRecord.name;
            document.getElementById('edit-meta').textContent =
                `${selectedRecord.compensation_case || '—'} · ปี ${selectedRecord.fiscal_year || '—'} · ${selectedRecord.incident_date || '—'}`;
            document.getElementById('edit-current-badge').innerHTML =
                `<small style="font-size:10px;color:var(--c-ink3);margin-right:4px">สถานะปัจจุบัน</small>${statusBadge(selectedRecord.compensation_status)}`;

            // reset status options
            document.querySelectorAll('.status-opt').forEach(b => b.classList.remove('active'));
            const btn = document.getElementById('btn-save');
            btn.disabled = true;
            btn.textContent = 'เลือกสถานะก่อนบันทึก';

            document.getElementById('edit-panel').classList.add('show');
            document.getElementById('edit-panel').scrollIntoView({ behavior: 'smooth', block: 'nearest' });
        }

        function selectStatus(status) {
            selectedStatus = status;
            document.querySelectorAll('.status-opt').forEach(b => b.classList.remove('active'));
            event.currentTarget.classList.add('active');

            const btn = document.getElementById('btn-save');
            if (status === selectedRecord?.compensation_status) {
                btn.disabled = true;
                btn.textContent = 'สถานะเดิมอยู่แล้ว';
            } else {
                btn.disabled = false;
                btn.textContent = `บันทึก → "${status}"`;
            }
        }

        async function saveStatus() {
            if (!selectedRecord || !selectedStatus) return;
            if (selectedStatus === selectedRecord.compensation_status) return;

            const btn = document.getElementById('btn-save');
            btn.disabled = true;
            btn.innerHTML = '<span class="spinner"></span>กำลังบันทึก...';

            try {
                const res = await fetch(
                    `${SUPABASE_URL}/rest/v1/compensation?id=eq.${selectedRecord.id}`,
                    {
                        method: 'PATCH',
                        headers: {
                            'apikey': SUPABASE_KEY,
                            'Authorization': `Bearer ${SUPABASE_KEY}`,
                            'Content-Type': 'application/json',
                            'Prefer': 'return=minimal'
                        },
                        body: JSON.stringify({ compensation_status: selectedStatus })
                    }
                );

                if (res.ok) {
                    // อัปเดต local data
                    selectedRecord.compensation_status = selectedStatus;
                    const idx = allData.findIndex(r => r.id === selectedRecord.id);
                    if (idx > -1) allData[idx].compensation_status = selectedStatus;

                    showToast(`✓ อัปเดตสถานะ "${selectedRecord.name}" เรียบร้อย`, 'success');
                    cancelEdit();
                    document.getElementById('search-input').value = '';
                    document.getElementById('results').style.display = 'none';
                } else {
                    throw new Error('บันทึกไม่สำเร็จ');
                }
            } catch (e) {
                showToast('❌ เกิดข้อผิดพลาด กรุณาลองใหม่', 'error');
                btn.disabled = false;
                btn.textContent = `บันทึก → "${selectedStatus}"`;
            }
        }

        function cancelEdit() {
            selectedRecord = null;
            selectedStatus = null;
            document.getElementById('edit-panel').classList.remove('show');
            document.querySelectorAll('.result-item').forEach(el => el.classList.remove('selected'));
        }

        function showToast(msg, type = '') {
            const t = document.getElementById('toast');
            t.textContent = msg;
            t.className = `toast ${type} show`;
            setTimeout(() => t.className = 'toast', 3000);
        }
    </script>
</body>

</html>
